<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca CEP - Encontre seu endereço</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.2em;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .input-group {
            flex: 1;
            min-width: 200px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
            font-size: 0.9em;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="text"]:read-only {
            background-color: #f8f9fa;
            cursor: not-allowed;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            align-self: flex-end;
            height: 48px;
        }

        button:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .result-box {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #e0e0e0;
        }

        .result-title {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.3em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .result-title i {
            color: #667eea;
        }

        .address-item {
            display: flex;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        .address-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .address-label {
            font-weight: 600;
            color: #555;
            width: 100px;
            min-width: 100px;
        }

        .address-value {
            color: #333;
            flex: 1;
            word-break: break-word;
        }

        .cep-format {
            font-family: 'Courier New', monospace;
            font-size: 1.1em;
            color: #667eea;
            font-weight: 600;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background-color: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
            border: 1px solid #fcc;
        }

        .error-message.active {
            display: block;
        }

        .info-note {
            font-size: 0.85em;
            color: #888;
            margin-top: 15px;
            text-align: center;
            border-top: 1px solid #e0e0e0;
            padding-top: 15px;
        }

        .info-note i {
            color: #667eea;
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 1.8em;
            }
            
            .search-box {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
            
            .address-item {
                flex-direction: column;
            }
            
            .address-label {
                width: 100%;
                margin-bottom: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Busca CEP</h1>
        <p class="subtitle">Digite um CEP para encontrar o endereço completo</p>
        
        <div class="search-box">
            <div class="input-group">
                <label for="cep">CEP</label>
                <input type="text" id="cep" placeholder="Digite o CEP (apenas números)" maxlength="9" autocomplete="off">
            </div>
            <button onclick="buscarCEP()">Buscar</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px; color: #666;">Buscando endereço...</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="result-box" id="resultado">
            <div class="result-title">
                <i>📋</i>
                Informações do Endereço
            </div>
            
            <div class="address-item">
                <span class="address-label">CEP:</span>
                <span class="address-value cep-format" id="resultCep">-</span>
            </div>
            
            <div class="address-item">
                <span class="address-label">Logradouro:</span>
                <span class="address-value" id="resultLogradouro">-</span>
            </div>
            
            <div class="address-item">
                <span class="address-label">Bairro:</span>
                <span class="address-value" id="resultBairro">-</span>
            </div>
            
            <div class="address-item">
                <span class="address-label">Cidade:</span>
                <span class="address-value" id="resultCidade">-</span>
            </div>
            
            <div class="address-item">
                <span class="address-label">Estado:</span>
                <span class="address-value" id="resultEstado">-</span>
            </div>
        </div>

        <div class="info-note">
            <i>ℹ️</i> Utilize apenas números no CEP. Exemplo: 01001000
        </div>
    </div>

    <script>
        // Elementos do DOM
        const cepInput = document.getElementById('cep');
        const loadingElement = document.getElementById('loading');
        const errorElement = document.getElementById('errorMessage');
        
        // Elementos de resultado
        const resultCep = document.getElementById('resultCep');
        const resultLogradouro = document.getElementById('resultLogradouro');
        const resultBairro = document.getElementById('resultBairro');
        const resultCidade = document.getElementById('resultCidade');
        const resultEstado = document.getElementById('resultEstado');

        // Formata o CEP enquanto o usuário digita
        cepInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, ''); // Remove tudo que não é número
            
            if (value.length > 8) {
                value = value.slice(0, 8);
            }
            
            if (value.length > 5) {
                value = value.replace(/^(\d{5})(\d)/, '$1-$2');
            }
            
            e.target.value = value;
        });

        // Permite apenas números no campo de CEP
        cepInput.addEventListener('keypress', function(e) {
            const charCode = e.which ? e.which : e.keyCode;
            if (charCode < 48 || charCode > 57) {
                e.preventDefault();
            }
        });

        // Busca o CEP quando pressionar Enter
        cepInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                buscarCEP();
            }
        });

        async function buscarCEP() {
            // Limpa mensagens anteriores
            errorElement.classList.remove('active');
            errorElement.textContent = '';
            
            // Obtém o CEP digitado (removendo o hífen)
            let cep = cepInput.value.replace(/\D/g, '');
            
            // Validação básica
            if (cep.length !== 8) {
                mostrarErro('CEP inválido. Digite um CEP com 8 números.');
                return;
            }

            // Mostra loading
            loadingElement.classList.add('active');
            
            try {
                // Faz a requisição para a API ViaCEP
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();
                
                // Esconde o loading
                loadingElement.classList.remove('active');
                
                // Verifica se retornou erro
                if (data.erro) {
                    mostrarErro('CEP não encontrado. Verifique o número digitado.');
                    limparResultados();
                    return;
                }
                
                // Preenche os resultados
                preencherResultados(data);
                
            } catch (error) {
                // Esconde o loading
                loadingElement.classList.remove('active');
                
                // Mostra erro
                mostrarErro('Erro ao buscar o CEP. Verifique sua conexão e tente novamente.');
                limparResultados();
            }
        }

        function preencherResultados(endereco) {
            resultCep.textContent = formatarCep(endereco.cep);
            resultLogradouro.textContent = endereco.logradouro || 'Não disponível';
            resultBairro.textContent = endereco.bairro || 'Não disponível';
            resultCidade.textContent = endereco.localidade || 'Não disponível';
            resultEstado.textContent = endereco.uf || 'Não disponível';
        }

        function limparResultados() {
            resultCep.textContent = '-';
            resultLogradouro.textContent = '-';
            resultBairro.textContent = '-';
            resultCidade.textContent = '-';
            resultEstado.textContent = '-';
        }

        function formatarCep(cep) {
            if (!cep) return '-';
            // Remove qualquer caractere não numérico e formata
            cep = cep.replace(/\D/g, '');
            return cep.replace(/^(\d{5})(\d{3})$/, '$1-$2');
        }

        function mostrarErro(mensagem) {
            errorElement.textContent = mensagem;
            errorElement.classList.add('active');
            
            // Esconde automaticamente após 5 segundos
            setTimeout(() => {
                errorElement.classList.remove('active');
            }, 5000);
        }

        // Limpa o campo de CEP quando a página carrega
        window.addEventListener('load', function() {
            cepInput.value = '';
        });

        // Busca automática quando colar um CEP completo
        cepInput.addEventListener('paste', function() {
            setTimeout(() => {
                const cep = cepInput.value.replace(/\D/g, '');
                if (cep.length === 8) {
                    buscarCEP();
                }
            }, 100);
        });
    </script>
</body>
</html>
